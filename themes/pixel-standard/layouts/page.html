{{define "content"}}
<div x-data="postsList()" x-init="init()" x-cloak style="image-rendering: pixelated;">
    <div class="grix xs1 lg3 gutter-xs4">

        <!-- LEFT: Page Content (2 cols) -->
        <div class="col-xs1 col-lg2">
            <article class="card white p-4" style="border: 4px solid black; box-shadow: 6px 6px 0px #000;">
                <div class="card-header px-0 mb-4 pb-3" style="border-bottom: 3px solid black;">
                    <h1 class="pixel-text font-s5 text-slate-900 mb-0">{{.Page.Title}}</h1>
                </div>
                <div class="card-content px-0" style="line-height: 1.8; font-family: 'Outfit', sans-serif; font-size: 0.95rem;">
                    {{if .Page.Content}}
                        {{.Page.Content | safeHTML}}
                    {{else}}
                        <p>This page has no content yet. <a href="/manage/pages">Edit it in the admin</a>.</p>
                    {{end}}
                </div>
            </article>
        </div>

        <!-- RIGHT: Recent Posts Sidebar (1 col) -->
        <div class="col-xs1 col-lg1">
            <div class="card white" style="border: 4px solid black; box-shadow: 6px 6px 0px #000; position: sticky; top: 20px;">
                <div class="card-header px-4 py-3 text-center" style="background: #000; border-bottom: 4px solid #000;">
                    <h3 class="pixel-text font-s2 text-white mb-0" style="font-size: 0.6rem; letter-spacing: 2px;">&#9632; RECENT POSTS</h3>
                </div>
                <div class="card-content p-0">
                    <template x-if="loading">
                        <div class="px-4 py-3 text-center pixel-text text-blue" style="font-size: 0.55rem;">LOADING...</div>
                    </template>
                    <template x-if="!loading && posts.length === 0">
                        <div class="px-4 py-3 text-center pixel-text text-grey" style="font-size: 0.55rem;">NO POSTS YET</div>
                    </template>
                    <ul style="list-style: none; padding: 0; margin: 0;">
                        <template x-for="(post, index) in posts.slice(0, 8)" :key="post.id">
                            <li :style="index < posts.slice(0,8).length - 1 ? 'border-bottom: 2px solid #000;' : ''">
                                <a :href="'/entry/' + post.slug"
                                   class="d-block px-4 py-3 hover-bg-blue-light-5 transition-all"
                                   style="text-decoration: none; color: inherit;">
                                    <div class="pixel-text text-slate-900 mb-1" style="font-size: 0.55rem; line-height: 1.6;" x-text="post.entry_title"></div>
                                    <div class="d-flex fx-space-between vcenter mt-1">
                                        <span class="pixel-text text-blue" style="font-size: 0.45rem;" x-text="post.pages && post.pages.length ? post.pages[0].title.toUpperCase() : 'MAIN'"></span>
                                        <span class="pixel-text text-grey" style="font-size: 0.45rem;" x-text="new Date(post.created_at).toLocaleDateString()"></span>
                                    </div>
                                </a>
                            </li>
                        </template>
                    </ul>
                </div>
            </div>
        </div>

    </div>
</div>
{{end}}
