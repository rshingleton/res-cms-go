{{define "content"}}
<div class="max-w-md mx-auto mt-8">
<div class="bg-white rounded-lg shadow p-6">
<h1 class="text-2xl font-bold text-gray-800 mb-6">Your Profile</h1>

{{with .Flash}}
<div class="bg-blue-50 border-l-4 border-blue-500 p-4 mb-4">
<p class="text-blue-800">{{.}}</p>
</div>
{{end}}

<form method="POST" action="/profile">
<div class="mb-4">
<label for="email" class="block text-gray-700 text-sm font-bold mb-2">Email</label>
<input type="email" id="email" name="email" value="{{.User.Email}}"
class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500">
</div>

<div class="mb-6">
<label for="password" class="block text-gray-700 text-sm font-bold mb-2">New Password (leave blank to keep current)</label>
<input type="password" id="password" name="password"
class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500">
</div>

<button type="submit" class="w-full bg-blue-600 text-white font-bold py-2 px-4 rounded-lg hover:bg-blue-700">
Update Profile
</button>
</form>
</div>
</div>
{{end}}
