<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.res_blog_name}}</title>
    {{if .res_meta_desc}}<meta name="description" content="{{.res_meta_desc}}">{{end}}
    
    <!-- Axentix CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/axentix@2.3.0/dist/axentix.min.css">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- Alpine.js -->
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <style>
        [x-cloak] { display: none !important; }
        body { font-family: 'Outfit', sans-serif; }
        .container { max-width: 1400px; width: 95%; }
    </style>
    {{.res_custom_css_style}}

    {{if .res_ga_id}}
    <!-- Global site tag (gtag.js) - Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id={{.res_ga_id}}"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', '{{.res_ga_id}}');
    </script>
    {{end}}

    {{.res_custom_header_html_parsed}}
</head>
<body class="layout">
    {{template "partials/header.html" .}}

    <main class="container py-5">
        {{block "content" .}}{{end}}
    </main>

    {{template "partials/footer.html" .}}

    {{.res_custom_footer_html_parsed}}

    <!-- Axentix JS -->
    <script src="https://cdn.jsdelivr.net/npm/axentix@2.3.0/dist/axentix.min.js"></script>

    {{.res_custom_js_script}}

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.store('app', {
                siteName: '{{.res_blog_name}}',
                sidebar: {{.Sidebar | js}},
                notifications: [],
                notify(message, type = 'info') {
                    const id = Date.now();
                    this.notifications.push({ id, message, type });
                    setTimeout(() => {
                        this.notifications = this.notifications.filter(n => n.id !== id);
                    }, 3000);
                }
            });
        });
    </script>
</body>
</html>
