{{define "content"}}
<div x-data="{ entry: {{.Entry | js}} }">
    <div class="grix xs1 lg3 gutter-xs5">

        <!-- LEFT: Article content (2 cols) -->
        <div class="col-xs1 col-lg2">
            <article class="card white p-5 shadow-1 mb-4">
                <!-- Meta bar -->
                <div class="d-flex fx-row fx-space-between vcenter mb-4 pb-3" style="border-bottom: 1px solid #eee;">
                    <span class="tag blue-light-4 text-blue font-w700 font-s1 rounded-2 uppercase"
                          x-text="entry.pages && entry.pages.length ? entry.pages[0].title : 'General'"></span>
                    <span class="text-grey font-s1" x-text="new Date(entry.created_at).toLocaleDateString()"></span>
                </div>

                <!-- Title -->
                <h1 class="font-w900 font-s6 text-slate-900 mb-4 leading-tight" x-text="entry.entry_title"></h1>

                <!-- Author line (no avatar) -->
                <div class="d-flex vcenter mb-5 pb-4" style="border-bottom: 2px solid #f0f0f0;">
                    <span class="text-grey font-s1 mr-2">By</span>
                    <span class="font-w700 font-s2 text-slate-900" x-text="entry.author ? entry.author.username : 'Admin'"></span>
                </div>

                <!-- Content -->
                <div class="font-s2" style="line-height: 1.9; color: #333;" x-html="entry.content"></div>

                <!-- Tags -->
                <div class="d-flex fx-row fx-wrap g-gap-2 mt-5 pt-4" style="border-top: 1px solid #eee;">
                    <template x-for="tag in entry.tags" :key="tag.id">
                        <a :href="'/entries/tag/' + tag.slug"
                           class="tag grey-light-4 text-grey-dark-2 font-w600 font-s1 rounded-2"
                           x-text="'#' + tag.name"></a>
                    </template>
                </div>
            </article>

            <!-- Comments -->
            <div class="card white p-5 shadow-1">
                <h3 class="font-w900 font-s4 text-slate-900 mb-4 pb-3" style="border-bottom: 2px solid #eee;">
                    Comments
                    <span class="text-grey font-s2 font-w600 ml-2"
                          x-text="'(' + (entry.comments ? entry.comments.length : 0) + ')'"></span>
                </h3>
                <div>
                    <template x-if="!entry.comments || entry.comments.length === 0">
                        <p class="text-grey font-s2">No comments yet. Be the first to comment!</p>
                    </template>
                    <template x-for="comment in entry.comments" :key="comment.id">
                        <div class="mb-4 pb-4" style="border-bottom: 1px solid #f0f0f0;">
                            <div class="d-flex fx-space-between vcenter mb-2">
                                <span class="font-w700 font-s2 text-slate-900" x-text="comment.author"></span>
                                <span class="text-grey font-s1" x-text="new Date(comment.created_at).toLocaleDateString()"></span>
                            </div>
                            <p class="font-s2 text-slate-700 mb-0" x-text="comment.content"></p>
                        </div>
                    </template>
                </div>

                <!-- Comment form -->
                <form method="POST" action="/comment/add" class="mt-4">
                    <input type="hidden" name="post_id" :value="entry.id">
                    <div class="form-field form-material mb-3">
                        <input type="text" id="comment-author" name="author" class="form-control font-w600" required />
                        <label for="comment-author">Your Name</label>
                    </div>
                    <div class="form-field form-material mb-4">
                        <textarea id="comment-content" name="content" class="form-control font-w600" rows="4" required></textarea>
                        <label for="comment-content">Comment</label>
                    </div>
                    <button type="submit" class="btn blue rounded-1 shadow-1 font-w800">Post Comment</button>
                </form>
            </div>
        </div>

        <!-- RIGHT: Sidebar (1 col) -->
        <div class="col-xs1 col-lg1">
            <div class="card white shadow-2" style="position: sticky; top: 20px;">
                <div class="card-header px-4 py-3" style="border-bottom: 2px solid #eee; background: #f8f9fa;">
                    <h3 class="font-w900 font-s3 text-slate-900 mb-0">Recent Posts</h3>
                </div>
                <div class="card-content p-0">
                    <ul style="list-style: none; padding: 0; margin: 0;">
                        {{range .Sidebar.Recent}}
                        <li style="border-bottom: 1px solid #f0f0f0;">
                            <a href="/entry/{{.Slug}}"
                               class="d-block px-4 py-3 hover-bg-slate-light-5 transition-all"
                               style="text-decoration: none; color: inherit;">
                                <div class="font-w700 font-s2 text-slate-900 mb-1" style="line-height: 1.4;">{{.EntryTitle}}</div>
                            </a>
                        </li>
                        {{else}}
                        <li class="px-4 py-3 text-center text-grey font-w600">No posts yet.</li>
                        {{end}}
                    </ul>
                </div>
            </div>
        </div>

    </div>
</div>
{{end}}
