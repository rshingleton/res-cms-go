{{define "content"}}
<div class="max-w-md mx-auto mt-8">
<div class="bg-white rounded-lg shadow p-6">
<h1 class="text-2xl font-bold text-gray-800 mb-6">Login</h1>

{{with .Flash}}
<div class="bg-blue-50 border-l-4 border-blue-500 p-4 mb-4">
<p class="text-blue-800">{{.}}</p>
</div>
{{end}}

<form method="POST" action="/access/login">
<input type="hidden" name="csrf_token" value="{{.CSRFToken}}">

<div class="mb-4">
<label for="username" class="block text-gray-700 text-sm font-bold mb-2">Username</label>
<input type="text" id="username" name="username" required
class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500">
</div>

<div class="mb-6">
<label for="password" class="block text-gray-700 text-sm font-bold mb-2">Password</label>
<input type="password" id="password" name="password" required
class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500">
</div>

<button type="submit" class="w-full bg-blue-600 text-white font-bold py-2 px-4 rounded-lg hover:bg-blue-700 transition">
Login
</button>
</form>

<p class="mt-4 text-center text-gray-600">
Default: admin/admin
</p>
</div>
</div>
{{end}}
