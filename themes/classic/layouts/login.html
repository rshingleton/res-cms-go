{{define "content"}}
<div class="d-flex vcenter justify-center" style="min-height: 60vh;">
    <div class="card white shadow-2 p-5 rounded-1" style="width: 100%; max-width: 420px;">

        <div class="text-center mb-5">
            <h1 class="font-w900 font-s6 text-slate-900 mb-1">Welcome back</h1>
            <p class="text-grey font-s2 mb-0">Sign in to your account</p>
        </div>

        {{with .Flash}}
        <div class="card blue-light-4 px-4 py-3 rounded-1 mb-4">
            <span class="text-blue font-w700 font-s2">{{.}}</span>
        </div>
        {{end}}

        <form method="POST" action="/access/login">
            <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
            <div class="form-field form-material mb-4">
                <input type="text" id="login-username" name="username" class="form-control font-w600" required autocomplete="username" />
                <label for="login-username">Username</label>
            </div>
            <div class="form-field form-material mb-5">
                <input type="password" id="login-password" name="password" class="form-control font-w600" required autocomplete="current-password" />
                <label for="login-password">Password</label>
            </div>
            <button type="submit" class="btn blue rounded-1 shadow-1 font-w800 d-block" style="width: 100%;">
                Sign In
            </button>
        </form>

        <p class="text-center text-grey font-s1 mt-4">Default credentials: admin / admin</p>
    </div>
</div>
{{end}}
