{{define "content"}}
<div x-data="{ tab: 'general', saving: false }" x-cloak class="grix xs1 gutter-xs4" style="width: 100%;">
    <div class="d-flex fx-row fx-space-between vcenter">
        <h1 class="font-w900 font-s6 text-slate-900 mb-0">System Settings</h1>
    </div>

    <div class="d-flex g-gap-2 bg-slate-light-5 p-2 rounded-1" style="width: fit-content;">
        <button @click="tab = 'general'" 
                :class="tab === 'general' ? 'blue text-white shadow-1' : 'transparent text-grey hover-bg-slate-light-4'"
                class="btn rounded-1 font-w800 no-shadow transition-all">
            General Configuration
        </button>
        <button @click="tab = 'seo'" 
                :class="tab === 'seo' ? 'blue text-white shadow-1' : 'transparent text-grey hover-bg-slate-light-4'"
                class="btn rounded-1 font-w800 no-shadow transition-all">
            SEO & Metadata
        </button>
        <button @click="tab = 'comments'" 
                :class="tab === 'comments' ? 'blue text-white shadow-1' : 'transparent text-grey hover-bg-slate-light-4'"
                class="btn rounded-1 font-w800 no-shadow transition-all">
            Comments
        </button>
    </div>

    <form method="POST" action="/manage/configs" class="w-100" id="settings-form">
        <!-- General Tab -->
        <div x-show="tab === 'general'" class="card white rounded-1 shadow-1 p-5 mb-5 w-100 border-all-1 border-slate-light-4">
            <h3 class="font-w900 font-s4 text-slate-900 mb-4 border-bottom-1 border-slate-light-5 pb-2">Site Identity</h3>
            
            <div class="form-field form-material mb-4">
                <input type="text" id="blog_name" name="blog_name" value="{{index .Settings "blog_name"}}"
                       class="form-control font-w700 text-slate-800" required>
                <label for="blog_name" class="active">Website Name</label>
                <p class="font-s1 text-grey-dark-1 mt-1 font-w600"><i class="fas fa-info-circle mr-1"></i> This appears in your header and browser title.</p>
            </div>
            
            <div class="form-field form-material mb-4 mt-5">
                <input type="text" id="tagline" name="tagline" value="{{index .Settings "tagline"}}" placeholder="Enter an engaging tagline..."
                       class="form-control font-w700 text-slate-800">
                <label for="tagline" class="active">Global Tagline</label>
            </div>
        </div>

        <!-- SEO Tab -->
        <div x-show="tab === 'seo'" class="card white rounded-1 shadow-1 p-5 mb-5 w-100 border-all-1 border-slate-light-4">
            <h3 class="font-w900 font-s4 text-slate-900 mb-4 border-bottom-1 border-slate-light-5 pb-2">Search Engine Optimization</h3>
            
            <div class="form-field form-material mb-5">
                <textarea id="meta_desc" name="meta_desc" rows="3" class="form-control font-w600 text-slate-800" placeholder="Enter site description for search engines...">{{index .Settings "meta_desc"}}</textarea>
                <label for="meta_desc" class="active">Global Meta Description</label>
            </div>
            
            <div class="form-field form-material mb-4">
                <input type="text" id="ga_id" name="ga_id" value="{{index .Settings "ga_id"}}" placeholder="G-XXXXXXXXXX" class="form-control font-w700 text-slate-800">
                <label for="ga_id" class="active">Google Analytics Tracking ID</label>
            </div>
        </div>

        <!-- Comments Tab -->
        <div x-show="tab === 'comments'" class="card white rounded-1 shadow-1 p-5 mb-5 w-100 border-all-1 border-slate-light-4">
            <h3 class="font-w900 font-s4 text-slate-900 mb-4 border-bottom-1 border-slate-light-5 pb-2">Global Comment Settings</h3>
            
            <div class="mb-4">
                <label class="form-check d-flex vcenter cursor-pointer">
                    <input type="checkbox" name="posts_comments_enabled" {{if eq (index .Settings "posts_comments_enabled") "1"}}checked{{end}} class="mr-3">
                    <span class="font-w700 text-slate-800">Enable Comments on Posts by default</span>
                </label>
                <p class="font-s1 text-grey ml-5 mt-1">If disabled, comments will be turned off for all posts regardless of individual settings.</p>
            </div>

            <div class="mb-4 mt-5">
                <label class="form-check d-flex vcenter cursor-pointer">
                    <input type="checkbox" name="pages_comments_enabled" {{if eq (index .Settings "pages_comments_enabled") "1"}}checked{{end}} class="mr-3">
                    <span class="font-w700 text-slate-800">Enable Comments on Pages by default</span>
                </label>
                <p class="font-s1 text-grey ml-5 mt-1">Usually disabled for static pages.</p>
            </div>
        </div>

        <div class="d-flex fx-row fx-right mt-4">
            <button type="button" @click="saveSettings" :disabled="saving" class="btn blue rounded-1 font-w900 px-5 shadow-1 d-flex vcenter">
                <i x-show="!saving" class="fas fa-save mr-2"></i>
                <i x-show="saving" class="fas fa-spinner fa-spin mr-2"></i>
                <span x-text="saving ? 'Saving...' : 'Save Configuration'"></span>
            </button>
        </div>
    </form>
</div>

<script>
    function saveSettings() {
        const alpine = document.querySelector('[x-data]').__x.$data;
        alpine.saving = true;

        const form = document.getElementById('settings-form');
        const formData = new FormData(form);

        fetch('/manage/configs', {
            method: 'POST',
            body: formData,
            headers: {
                'X-Requested-With': 'XMLHttpRequest'
            }
        })
        .then(res => {
            if (res.ok) {
                Alpine.store('app').notify('Settings saved successfully', 'success');
            } else {
                Alpine.store('app').notify('Failed to save settings', 'error');
            }
        })
        .catch(err => {
            console.error(err);
            Alpine.store('app').notify('Error connecting to server', 'error');
        })
        .finally(() => {
            alpine.saving = false;
        });
    }
</script>
{{end}}
