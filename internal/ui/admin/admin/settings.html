{{define "content"}}
<div x-data="{ tab: 'general' }" class="max-w-4xl">
    <div class="flex gap-1 bg-slate-100 p-1 rounded-xl mb-8 w-fit shadow-inner">
        <button @click="tab = 'general'" 
                :class="tab === 'general' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'"
                class="px-6 py-2 rounded-lg text-sm font-bold transition-all">
            General
        </button>
        <button @click="tab = 'seo'" 
                :class="tab === 'seo' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'"
                class="px-6 py-2 rounded-lg text-sm font-bold transition-all">
            SEO & Metadata
        </button>
    </div>

    <form method="POST" action="/manage/configs" class="space-y-6">
        <!-- General Tab -->
        <div x-show="tab === 'general'" x-cloak class="bg-white rounded-3xl border border-slate-200 shadow-sm p-8 space-y-6">
            <div>
                <label for="blog_name" class="block text-sm font-bold text-slate-700 mb-2">Website Name</label>
                <input type="text" id="blog_name" name="blog_name" value="{{index .Settings "blog_name"}}"
                       class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-4 focus:ring-blue-100 focus:border-blue-500 transition-all outline-none">
                <p class="mt-2 text-xs text-slate-400">This appears in your header and browser title.</p>
            </div>
            
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">Tagline</label>
                <input type="text" name="tagline" placeholder="Knowledge is power"
                       class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-4 focus:ring-blue-100 focus:border-blue-500 transition-all outline-none">
            </div>
        </div>


        <!-- SEO Tab -->
        <div x-show="tab === 'seo'" x-cloak class="bg-white rounded-3xl border border-slate-200 shadow-sm p-8 space-y-6">
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">Meta Description</label>
                <textarea rows="3" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-4 focus:ring-blue-100 focus:border-blue-500 transition-all outline-none" placeholder="Enter site description..."></textarea>
            </div>
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">Google Analytics ID</label>
                <input type="text" placeholder="G-XXXXXXXXXX" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-4 focus:ring-blue-100 focus:border-blue-500 transition-all outline-none">
            </div>
        </div>

        <div class="flex justify-end pt-4">
            <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-10 rounded-2xl transition-all shadow-xl shadow-blue-100">
                Update Configuration
            </button>
        </div>
    </form>
</div>
{{end}}
