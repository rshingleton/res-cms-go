{{define "content"}}
<div x-data="postEditor()" x-init="init({{.Post | js}}, {{.Pages | js}}, {{.Tags | js}})" class="grix xs1 gutter-xs4" style="width: 100%;">
    <!-- Header -->
    <div class="d-flex fx-row fx-space-between vcenter mb-2">
        <div>
            <h1 class="font-w900 font-s6 text-slate-900 mb-1" x-text="post.id === 0 ? 'Create Post' : 'Edit Post'"></h1>
            <p class="text-grey font-s2 mb-0" x-text="post.id === 0 ? 'Draft a new story for your audience.' : 'Update your published content.'"></p>
        </div>
        <div class="d-flex g-gap-2">
            <a href="/manage/posts" class="btn white text-slate-700 shadow-1 rounded-1 font-w700">
                <i class="fas fa-arrow-left mr-2"></i> Dashboard
            </a>
            <button @click="submitPost(false)" class="btn blue rounded-1 shadow-1 font-w900" :disabled="saving">
                <i class="fas fa-save mr-2" :class="saving ? 'fa-spinner fa-spin' : ''"></i> 
                <span x-text="saving ? 'Saving...' : 'Save Content'"></span>
            </button>
        </div>
    </div>

    <div class="grix xs1 lg3 gutter-xs4">
        <!-- Main Content Pane -->
        <div class="col-xs1 col-lg2">
            <div class="card white shadow-1 rounded-1 p-4 mb-4">
                <div class="form-field form-material mb-4">
                    <input type="text" id="post-title" x-model="post.title" @input="updateSlug" class="form-control font-w800 font-s4 text-slate-900" placeholder="Enter title..." required />
                    <label for="post-title">Post Title</label>
                </div>

                <div class="form-field form-material mb-4">
                    <input type="text" id="post-slug" x-model="post.slug" class="form-control font-w600 text-blue" placeholder="url-slug-here" />
                    <label for="post-slug">URL Slug</label>
                </div>

                <!-- Quill Editor for Posts -->
                <div class="form-field mb-4">
                    <div id="toolbar-container">
                        <span class="ql-formats">
                            <select class="ql-header"><option value="1"></option><option value="2"></option><option value="3"></option><option selected></option></select>
                        </span>
                        <span class="ql-formats">
                            <button class="ql-bold"></button><button class="ql-italic"></button><button class="ql-underline"></button>
                        </span>
                        <span class="ql-formats">
                            <button class="ql-list" value="ordered"></button><button class="ql-list" value="bullet"></button>
                        </span>
                        <span class="ql-formats">
                            <button class="ql-link"></button><button class="ql-image"></button>
                        </span>
                        <span class="ql-formats">
                            <button class="ql-clean"></button>
                        </span>
                    </div>
                    <div id="post-quill-editor" style="min-height: 600px; border: 1px solid #ddd; border-radius: 0 0 4px 4px;"></div>
                </div>
                <textarea id="post-content-data" style="display:none;">{{.Post.Content}}</textarea>
            </div>
        </div>

        <!-- Sidebar Pane -->
        <div class="col-xs1 col-lg1">
            <div class="card white shadow-1 rounded-1 p-4 mb-4">
                <h3 class="font-w800 font-s2 text-slate-900 mb-4 pb-2 border-bottom-1 border-slate-light-4">Post Settings</h3>
                
                <div class="form-field mb-4">
                    <label class="font-w700 font-s1 text-slate-700 mb-2 d-block">Status</label>
                    <select x-model="post.status" class="form-control rounded-1">
                        <option value="draft">Draft</option>
                        <option value="published">Published</option>
                        <option value="private">Private</option>
                    </select>
                </div>

                <div class="form-field mb-4">
                    <label class="font-w700 font-s1 text-slate-700 mb-2 d-block">Published Date</label>
                    <input type="datetime-local" x-model="post.created_at" class="form-control rounded-1" @change="queueSave()">
                </div>

                <div class="form-field mb-4">
                    <label class="font-w700 font-s1 text-slate-700 mb-2 d-block">Pages</label>
                    <div class="d-flex fx-wrap g-gap-2">
                        <template x-for="cat in pages" :key="cat.id">
                            <label class="d-flex vcenter cursor-pointer p-2 rounded-1 border-all-1 transition-all"
                                   :class="selectedPages.includes(cat.id) ? 'bg-blue-light-5 border-blue text-blue' : 'bg-white border-slate-light-4 text-slate-700'">
                                <input type="checkbox" :value="cat.id" x-model="selectedPages" class="hidden" @change="queueSave()">
                                <span x-text="cat.title || cat.name || cat.title" class="font-w700 font-s1"></span>
                            </label>
                        </template>
                    </div>
                </div>

                <div class="form-field mb-4">
                    <label class="font-w700 font-s1 text-slate-700 mb-2 d-block">Tags</label>
                    <div class="d-flex fx-wrap g-gap-2">
                        <template x-for="tag in tags" :key="tag.id">
                            <div @click="toggleTag(tag.id)" 
                                 class="tag cursor-pointer transition-all font-w700 font-s1 rounded-2"
                                 :class="selectedTags.includes(tag.id) ? 'blue text-white' : 'grey light-4 text-slate-700'">
                                #<span x-text="tag.title || tag.name"></span>
                            </div>
                        </template>
                <div class="mt-4 pt-4 border-top-1 border-slate-light-4">
                    <label class="form-check d-flex vcenter cursor-pointer">
                        <input type="checkbox" x-model="post.comments_enabled" @change="queueSave()" class="mr-3">
                        <span class="font-w700 text-slate-800">Enable Comments</span>
                    </label>
                </div>

                <div class="mt-4 pt-4 border-top-1 border-slate-light-4">
                    <div class="d-flex fx-row fx-space-between vcenter text-grey font-s1">
                        <span>Auto-save:</span>
                        <span x-text="lastSavedText" class="font-w700"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Quill Scripts -->
<link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
<style>
    .ql-editor {
        min-height: 600px;
        font-family: 'Inter', sans-serif;
        font-size: 16px;
    }
    .ql-image-resizer {
        z-index: 1000;
    }
</style>
<script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/quill-image-resize-module@3.0.0/image-resize.min.js"></script>

<script>
function postEditor() {
    return {
        post: { id: 0, title: '', slug: '', content: '', status: 'draft', created_at: '', comments_enabled: true },
        pages: [], tags: [], selectedPages: [], selectedTags: [],
        saving: false, lastSaved: null, saveTimeout: null,
        quill: null,

        init(entry, allCategories, allTags) {
            console.log('Init with entry:', entry);
            if (entry && entry.id) {
                // Ensure correct field mapping from Go JSON
                this.post.id = entry.id;
                this.post.title = entry.title || '';
                this.post.slug = entry.slug || '';
                this.post.content = entry.content || '';
                this.post.status = entry.status || 'draft';
                this.post.comments_enabled = entry.comments_enabled !== false; // Default to true
                if (entry.created_at) {
                    // Convert RFC3339 to datetime-local format (YYYY-MM-DDThh:mm)
                    const d = new Date(entry.created_at);
                    const pad = (n) => n.toString().padStart(2, '0');
                    this.post.created_at = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
                }
                
                this.selectedPages = (entry.pages || []).map(c => c.id);
                this.selectedTags = (entry.tags || []).map(t => t.id);
            }
            this.pages = allCategories || [];
            this.tags = allTags || [];

            this.$nextTick(() => {
                this.setupQuill();
            });
        },

        setupQuill() {
            window.Quill = Quill;
            if (window.ImageResize && !Quill.imports['modules/imageResize']) {
                Quill.register('modules/imageResize', window.ImageResize.default || window.ImageResize);
            }

            this.quill = new Quill('#post-quill-editor', {
                theme: 'snow',
                modules: {
                    toolbar: {
                        container: '#toolbar-container',
                        handlers: { image: this.imageHandler.bind(this) }
                    },
                    imageResize: { displaySize: true }
                }
            });

            if (this.post.content) {
                this.quill.root.innerHTML = this.post.content;
            }

            this.quill.on('text-change', () => {
                this.post.content = this.quill.root.innerHTML;
                this.queueSave();
            });
        },

        imageHandler() {
            const input = document.createElement('input');
            input.setAttribute('type', 'file');
            input.setAttribute('accept', 'image/*');
            input.click();
            input.onchange = async () => {
                const file = input.files[0];
                const formData = new FormData();
                formData.append('upload', file);
                const range = this.quill.getSelection(true);
                try {
                    const res = await fetch('/api/upload/image', { method: 'POST', body: formData });
                    const data = await res.json();
                    if (data.url) this.quill.insertEmbed(range.index, 'image', data.url);
                } catch (err) { console.error(err); }
            };
        },

        updateSlug() {
            if (this.post.id === 0 || !this.post.slug) {
                this.post.slug = this.post.title.toLowerCase().replace(/[^\w ]+/g, '').replace(/ +/g, '-');
            }
        },

        get lastSavedText() {
            return this.lastSaved ? this.lastSaved.toLocaleTimeString() : 'Pending...';
        },

        queueSave() {
            if (this.saveTimeout) clearTimeout(this.saveTimeout);
            this.saveTimeout = setTimeout(() => this.submitPost(true), 2000);
        },

        toggleTag(tagId) {
            if (this.selectedTags.includes(tagId)) {
                this.selectedTags = this.selectedTags.filter(id => id !== tagId);
            } else {
                this.selectedTags.push(tagId);
            }
            this.queueSave();
        },

        async submitPost(isAutoSave = false) {
            this.saving = true;
            try {
                const payload = {
                    id: this.post.id,
                    title: this.post.title,
                    slug: this.post.slug,
                    content: this.post.content,
                    status: this.post.status,
                    comments_enabled: this.post.comments_enabled,
                    created_at: this.post.created_at ? new Date(this.post.created_at).toISOString() : null,
                    pages: this.selectedPages.map(id => parseInt(id)),
                    tags: this.selectedTags.map(id => parseInt(id))
                };
                const res = await fetch('/api/admin/posts/save', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if (res.ok) {
                    if (!isAutoSave) Alpine.store('app').notify('Post saved successfully', 'success');
                    if (this.post.id === 0) {
                        this.post.id = data.id;
                        window.history.pushState({}, '', `/manage/posts/edit/${data.id}`);
                    }
                    this.lastSaved = new Date();
                }
            } catch (err) {
                console.error(err);
                if (!isAutoSave) Alpine.store('app').notify('Save failed', 'error');
            } finally {
                this.saving = false;
            }
        }
    }
}
</script>
{{end}}
