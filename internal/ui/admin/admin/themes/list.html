{{define "content"}}
<div class="space-y-8">
    <div class="flex justify-between items-center">
        <div>
            <h1 class="text-3xl font-black text-slate-900">Theme Engine</h1>
            <p class="text-slate-500">Manage your modular Pixel Art themes and UI standards.</p>
        </div>
        <div x-data="{ open: false }">
            <button @click="open = true" class="bg-blue-600 text-white font-bold px-6 py-3 rounded-xl hover:bg-blue-700 transition-all shadow-lg shadow-blue-100 flex items-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                Upload Theme (.zip)
            </button>
            
            <!-- Upload Modal -->
            <div x-show="open" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm" x-cloak>
                <div @click.away="open = false" class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-8">
                    <h3 class="text-xl font-bold mb-4">Upload New Theme</h3>
                    <form action="/manage/themes/upload" method="POST" enctype="multipart/form-data" class="space-y-6">
                        <div class="border-2 border-dashed border-slate-200 rounded-xl p-8 text-center hover:border-blue-400 transition-colors">
                            <input type="file" name="theme_zip" accept=".zip" required class="hidden" id="theme-upload">
                            <label for="theme-upload" class="cursor-pointer">
                                <svg class="w-12 h-12 text-slate-300 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                                <p class="text-sm text-slate-500">Click to select theme archive</p>
                            </label>
                        </div>
                        <div class="flex gap-4">
                            <button type="button" @click="open = false" class="flex-1 px-4 py-3 border border-slate-200 rounded-xl font-bold text-slate-600 hover:bg-slate-50">Cancel</button>
                            <button type="submit" class="flex-1 px-4 py-3 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700">Upload</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        <template x-for="theme in {{ .Themes | json }}" :key="theme.Name">
            <div class="bg-white rounded-2xl border-2 transition-all overflow-hidden group" 
                 :class="theme.Active ? 'border-blue-600 shadow-xl shadow-blue-50' : 'border-slate-100 hover:border-slate-200'">
                <div class="aspect-video bg-slate-100 relative overflow-hidden flex items-center justify-center">
                    <template x-if="theme.Active">
                        <div class="absolute top-4 right-4 bg-blue-600 text-white text-[10px] font-black uppercase tracking-widest px-3 py-1 rounded-full shadow-lg">Active</div>
                    </template>
                    <div class="pixel-font text-2xl text-slate-300 opacity-50 group-hover:scale-110 transition-transform" x-text="theme.Name"></div>
                </div>
                <div class="p-6">
                    <h3 class="text-xl font-bold text-slate-900 mb-2" x-text="theme.Name"></h3>
                    <div class="flex items-center gap-3 mt-6">
                        <template x-if="!theme.Active">
                            <a :href="'/manage/themes/activate/' + theme.Name" class="flex-1 bg-slate-900 text-white text-center py-2.5 rounded-xl text-sm font-bold hover:bg-slate-800 transition-colors">Activate</a>
                        </template>
                        <a :href="'/manage/themes/export/' + theme.Name" class="p-2.5 border border-slate-200 rounded-xl hover:bg-slate-50 transition-colors" title="Export Theme">
                            <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                        </a>
                    </div>
                </div>
            </div>
        </template>
    </div>
</div>
{{end}}
