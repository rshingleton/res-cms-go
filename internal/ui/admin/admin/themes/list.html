{{define "content"}}
<div x-data="{ openUpload: false, openCopy: false, themeToCopy: '', newThemeName: '' }" x-cloak class="grix xs1 gutter-xs4" style="width: 100%;">
    <div class="d-flex fx-row fx-space-between vcenter">
        <div>
            <h1 class="font-w900 font-s6 text-slate-900 mb-0">Theme Manager</h1>
            <p class="text-grey font-s1 font-w600 mb-0 mt-1">Manage, Edit, and Duplicate your site themes.</p>
        </div>
        <div class="d-flex g-gap-2">
            <a href="/manage/editor?target=global:custom_css" class="btn white text-slate-700 rounded-1 shadow-1 d-flex vcenter font-w800">
                <i class="fas fa-magic mr-2 text-blue"></i> Global Customization
            </a>
            <button @click="openUpload = true" class="btn blue rounded-1 shadow-1 d-flex vcenter font-w800">
                <i class="fas fa-plus-circle mr-2"></i> Deploy Theme
            </button>
        </div>
    </div>

    <!-- Theme Grid -->
    <div class="grix xs1 sm2 md3 lg4 gutter-xs3 mt-4">
        <template x-for="theme in {{ .Themes | json }}" :key="theme.Name">
            <div class="card white rounded-1 transition-all overflow-hidden border-all-1 border-slate-light-4 group h-100 d-flex fx-col shadow-1 hover-shadow-3"
                 style="position: relative;"
                 :class="theme.Active ? 'border-blue-light-2 border-all-2' : ''">
                
                <template x-if="theme.Active">
                    <span class="tag-status blue text-white shadow-1" style="position: absolute; top: 0.5rem; left: 0.5rem; z-index: 2;">Primary</span>
                </template>

                <div class="d-flex vcenter fx-center bg-slate-light-5 overflow-hidden" style="height: 120px; position: relative;">
                    <i class="fas fa-swatchbook text-blue-light-4 opacity-30 font-s8 group-hover:scale-110 transition-transform"></i>
                    <!-- Actions Overlay -->
                    <div class="overlay bg-blue-light-4 d-flex vcenter fx-center g-gap-2 opacity-0 group-hover:opacity-100 transition-all" style="position: absolute; inset: 0; background: rgba(37, 99, 235, 0.1); backdrop-filter: blur(2px);">
                        <a :href="'/manage/editor?target=theme:' + theme.Name + ':theme.json'" class="btn btn-small white text-blue shadow-1 font-w900 rounded-1">
                            <i class="fas fa-code mr-1"></i> BROWSE FILES
                        </a>
                        <button @click="themeToCopy = theme.Name; newThemeName = theme.Name + '-copy'; openCopy = true" class="btn btn-small white text-grey shadow-1 font-w900 rounded-1">
                            <i class="fas fa-copy mr-1"></i> COPY
                        </button>
                    </div>
                </div>
                
                <div class="p-4 border-top-1 border-slate-light-5 d-flex fx-col fx-space-between bg-white" style="flex: 1;">
                    <div class="mb-4">
                        <div class="d-flex fx-row fx-space-between vcenter">
                            <h3 class="font-w900 font-s3 mb-0 text-slate-900 capitalize tracking-tight" x-text="theme.Name"></h3>
                            <a :href="'/manage/themes/export/' + theme.Name" class="btn btn-small circle transparent text-grey no-shadow hover-bg-slate-light-5" title="Export">
                                <i class="fas fa-download"></i>
                            </a>
                        </div>
                    </div>
                    
                    <div class="d-flex vcenter w-100 g-gap-2">
                        <template x-if="!theme.Active">
                            <a :href="'/manage/themes/activate/' + theme.Name" class="btn black btn-small rounded-1 font-w900 font-s1 py-2 tracking-widest" style="flex: 1;">ACTIVATE</a>
                        </template>
                        <template x-if="theme.Active">
                            <div class="text-center py-2 bg-blue-light-5 rounded-1 border-all-1 border-blue-light-3" style="flex: 1;">
                                <span class="text-blue font-w900 font-s1 uppercase tracking-widest">ACTIVE</span>
                            </div>
                        </template>
                    </div>
                </div>
            </div>
        </template>
    </div>

    <!-- Upload Modal -->
    <div id="upload-theme-modal" class="modal white rounded-1 shadow-2 p-5" x-show="openUpload" x-cloak>
        <div class="modal-header font-w900 font-s4 mb-4 text-slate-900">Install Theme</div>
        <form action="/manage/themes/upload" method="POST" enctype="multipart/form-data">
            <div class="p-5 border-all-2 border-dashed border-slate-light-4 rounded-1 text-center mb-4 bg-slate-light-5">
                <input type="file" name="theme_zip" accept=".zip" required style="display: none;" id="theme-upload">
                <label for="theme-upload" style="cursor: pointer;">
                    <i class="fas fa-cloud-upload-alt text-blue-light-3 font-s8 mb-3"></i>
                    <p class="text-grey font-w800 font-s1 mb-0">Select .zip archive</p>
                </label>
            </div>
            <div class="d-flex fx-row fx-right g-gap-3">
                <button type="button" @click="openUpload = false" class="btn white text-grey shadow-0 modal-close font-w700">Cancel</button>
                <button type="submit" class="btn blue rounded-1 shadow-1 font-w800">Install</button>
            </div>
        </form>
    </div>

    <!-- Copy/Rename Modal -->
    <div id="copy-theme-modal" class="modal white rounded-1 shadow-2 p-5" x-show="openCopy" x-cloak>
        <div class="modal-header font-w900 font-s4 mb-2 text-slate-900">Duplicate Theme</div>
        <p class="text-grey font-s1 mb-4">Creating a copy of <span class="text-blue font-w800" x-text="themeToCopy"></span></p>
        
        <form :action="'/manage/themes/copy/' + themeToCopy" method="POST">
            <div class="form-field form-material mb-5">
                <input type="text" name="new_name" x-model="newThemeName" class="form-control font-w700 text-slate-800" required>
                <label class="active">New Theme Name</label>
                <p class="font-s1 text-grey-dark-1 mt-1">Only letters, numbers, dashes and underscores.</p>
            </div>
            
            <div class="d-flex fx-row fx-right g-gap-3">
                <button type="button" @click="openCopy = false" class="btn white text-grey shadow-0 modal-close font-w700">Cancel</button>
                <button type="submit" class="btn blue rounded-1 shadow-1 font-w800">Create Copy</button>
            </div>
        </form>
    </div>
</div>

<style>
    .modal {
        max-width: 500px;
    }
</style>
{{end}}
