{{define "content"}}
<div x-data="adminDashboard()" x-init="init()" class="space-y-8">
    <!-- Stats Grid -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 text-slate-800">
        <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm flex items-center gap-4">
            <div class="w-12 h-12 rounded-xl bg-blue-50 text-blue-600 flex items-center justify-center">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10l4 4v10a2 2 0 01-2 2z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 2v4h4"></path></svg>
            </div>
            <div>
                <p class="text-xs font-bold text-slate-400 uppercase tracking-wider">Posts</p>
                <h3 class="text-2xl font-extrabold" x-text="stats.posts || 0"></h3>
            </div>
        </div>
        <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm flex items-center gap-4">
            <div class="w-12 h-12 rounded-xl bg-emerald-50 text-emerald-600 flex items-center justify-center">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg>
            </div>
            <div>
                <p class="text-xs font-bold text-slate-400 uppercase tracking-wider">Comments</p>
                <h3 class="text-2xl font-extrabold" x-text="stats.comments || 0"></h3>
            </div>
        </div>
        <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm flex items-center gap-4">
            <div class="w-12 h-12 rounded-xl bg-purple-50 text-purple-600 flex items-center justify-center">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
            </div>
            <div>
                <p class="text-xs font-bold text-slate-400 uppercase tracking-wider">Users</p>
                <h3 class="text-2xl font-extrabold" x-text="stats.users || 0"></h3>
            </div>
        </div>
        <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm flex items-center gap-4">
            <div class="w-12 h-12 rounded-xl bg-orange-50 text-orange-600 flex items-center justify-center">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 11h.01M7 15h.01M13 7h.01M13 11h.01M13 15h.01M17 7h.01M17 11h.01M17 15h.01"></path></svg>
            </div>
            <div>
                <p class="text-xs font-bold text-slate-400 uppercase tracking-wider">Categories</p>
                <h3 class="text-2xl font-extrabold" x-text="stats.categories || 0"></h3>
            </div>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
        <!-- Recent Posts -->
        <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center">
                <h4 class="font-bold text-slate-800">Recent Posts</h4>
                <a href="/manage/entries" class="text-sm text-blue-600 font-semibold hover:underline">View All</a>
            </div>
            <div class="divide-y divide-slate-50">
                <template x-for="post in recentPosts" :key="post.id">
                    <div class="p-4 hover:bg-slate-50 transition-colors flex justify-between items-center">
                        <div class="min-w-0">
                            <p class="font-semibold text-slate-900 truncate" x-text="post.entry_title"></p>
                            <p class="text-xs text-slate-400" x-text="new Date(post.created_at).toLocaleDateString()"></p>
                        </div>
                        <span class="px-2 py-1 rounded text-[10px] font-bold uppercase" 
                             :class="post.status === 'published' ? 'bg-emerald-50 text-emerald-600' : 'bg-slate-100 text-slate-400'"
                             x-text="post.status"></span>
                    </div>
                </template>
                <div x-show="!loading && recentPosts.length === 0" class="p-12 text-center text-slate-400 text-sm">
                    No posts found yet.
                </div>
            </div>
        </div>

        <!-- Pending Comments -->
        <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center">
                <h4 class="font-bold text-slate-800">Recent Comments</h4>
                <a href="/manage/comments" class="text-sm text-blue-600 font-semibold hover:underline">Manage</a>
            </div>
            <div class="divide-y divide-slate-50">
                <template x-for="comment in recentComments" :key="comment.id">
                    <div class="p-4 hover:bg-slate-50 transition-colors">
                        <div class="flex justify-between mb-1">
                            <span class="font-semibold text-sm text-slate-900" x-text="comment.author"></span>
                            <span class="text-[10px] text-slate-400" x-text="new Date(comment.created_at).toLocaleDateString()"></span>
                        </div>
                        <p class="text-xs text-slate-600 line-clamp-2" x-text="comment.content"></p>
                    </div>
                </template>
                <div x-show="!loading && recentComments.length === 0" class="p-12 text-center text-slate-400 text-sm">
                    No comments found.
                </div>
            </div>
        </div>
    </div>
</div>

<script>
function adminDashboard() {
    return {
        stats: {},
        recentPosts: [],
        recentComments: [],
        loading: true,
        
        async init() {
            this.loading = true;
            try {
                const [statsRes, postsRes, commentsRes] = await Promise.all([
                    fetch('/api/admin/stats'),
                    fetch('/api/admin/posts'),
                    fetch('/api/admin/comments')
                ]);
                
                this.stats = await statsRes.json();
                const allPosts = await postsRes.json();
                this.recentPosts = allPosts.slice(0, 5);
                const allComments = await commentsRes.json();
                this.recentComments = allComments.slice(0, 5);
            } catch (err) {
                console.error('Failed to fetch dashboard data', err);
            } finally {
                this.loading = false;
            }
        }
    }
}
</script>
{{end}}
