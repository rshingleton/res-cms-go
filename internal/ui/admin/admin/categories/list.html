{{define "content"}}
<h1 class="text-2xl font-bold text-gray-800 mb-6">Categories</h1>

<form method="POST" action="/manage/categories" class="bg-white rounded-lg shadow p-6 mb-6 space-y-4">

<p class="font-semibold">Add New Category</p>
<div>
<label for="name" class="block text-gray-700 text-sm font-bold mb-2">Name</label>
<input type="text" id="name" name="name" required
class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500">
</div>
<div>
<label for="slug" class="block text-gray-700 text-sm font-bold mb-2">Slug</label>
<input type="text" id="slug" name="slug" required
class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500">
</div>
<button type="submit" class="bg-blue-600 text-white font-bold py-2 px-4 rounded-lg hover:bg-blue-700">Add Category</button>
</form>

{{if .Categories}}
<table class="min-w-full bg-white rounded-lg shadow">
<thead>
<tr class="bg-gray-50">
<th class="px-4 py-2 text-left">Name</th>
<th class="px-4 py-2 text-left">Slug</th>
<th class="px-4 py-2 text-left">Actions</th>
</tr>
</thead>
<tbody>
{{range .Categories}}
<tr class="border-t">
<td class="px-4 py-2">{{.Name}}</td>
<td class="px-4 py-2">{{.Slug}}</td>
<td class="px-4 py-2">
<a href="/manage/categories/edit/{{.ID}}" class="text-blue-600 hover:underline mr-2">Edit</a>
<a href="/manage/categories/delete/{{.ID}}" class="text-red-600 hover:underline">Delete</a>
</td>

</tr>
{{end}}
</tbody>
</table>
{{end}}
{{end}}
