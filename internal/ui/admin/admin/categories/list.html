{{define "content"}}
<div class="grix xs1 gutter-xs4" style="width: 100%;">
    <div class="d-flex fx-row fx-space-between vcenter">
        <h1 class="font-w900 font-s6 text-slate-900 mb-0">Taxonomy / Categories</h1>
        <button data-target="add-category-modal" class="btn blue rounded-1 shadow-1 d-flex vcenter modal-trigger font-w800">
            <i class="fas fa-folder-plus mr-2"></i> New Category
        </button>
    </div>

    <div id="add-category-modal" class="modal white rounded-1 shadow-2 p-5">
        <div class="modal-header font-w900 font-s4 text-slate-900 mb-4">Add New Category</div>
        <form method="POST" action="/manage/categories" x-data="{ name: '', slug: '' }">
            <div class="form-field form-material mb-4">
                <input type="text" id="name" name="name" x-model="name" @input="slug = name.toLowerCase().replace(/[^\w ]+/g, '').replace(/ +/g, '-')" class="form-control font-w600" required />
                <label for="name">Category Name</label>
            </div>
            <div class="form-field form-material mb-4">
                <input type="text" id="slug" name="slug" x-model="slug" class="form-control font-w600" required />
                <label for="slug">URL Slug</label>
            </div>
            <div class="d-flex fx-row fx-right g-gap-3 mt-5">
                <button type="button" class="btn white text-grey shadow-0 modal-close font-w700">Cancel</button>
                <button type="submit" class="btn blue rounded-1 shadow-1 font-w800">Create Category</button>
            </div>
        </form>
    </div>

    <div class="card white shadow-1 rounded-1 overflow-hidden" style="width: 100%;">
        {{if .Categories}}
        <div class="table-responsive">
            <table class="table">
                <thead>
                    <tr>
                        <th class="font-w800 font-s1 uppercase text-slate-700">Category Name</th>
                        <th class="font-w800 font-s1 uppercase text-slate-700">Slug Path</th>
                        <th class="font-w800 font-s1 uppercase text-slate-700 text-right">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {{range .Categories}}
                    <tr class="hover-bg-slate-light-5 transition-all">
                        <td><span class="font-w800 text-slate-900">{{.Name}}</span></td>
                        <td><code class="font-w700 font-s1 text-grey-dark-2 bg-slate-light-4 px-2 py-1 rounded-1">{{.Slug}}</code></td>
                        <td class="text-right">
                            <div class="d-flex fx-row fx-right g-gap-2">
                                <a href="/manage/categories/edit/{{.ID}}" class="btn btn-small transparent text-blue shadow-0 hover-bg-blue-light-5 rounded-1" title="Edit">
                                    <i class="fas fa-edit"></i>
                                </a>
                                <a href="/manage/categories/delete/{{.ID}}" class="btn btn-small transparent text-red shadow-0 hover-bg-red-light-5 rounded-1" title="Delete">
                                    <i class="fas fa-trash"></i>
                                </a>
                            </div>
                        </td>
                    </tr>
                    {{end}}
                </tbody>
            </table>
        </div>
        {{else}}
        <div class="p-5 text-center text-grey font-w600">No categories defined yet.</div>
        {{end}}
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        new Axentix.Modal('#add-category-modal');
    });
</script>
{{end}}
