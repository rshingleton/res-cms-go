{{define "content"}}
<h1 class="text-2xl font-bold text-gray-800 mb-6">Edit Category</h1>

<form method="POST" action="/manage/categories/update/{{.Category.ID}}" class="bg-white rounded-lg shadow p-6 space-y-4">

<div>
<label for="name" class="block text-gray-700 text-sm font-bold mb-2">Name</label>
<input type="text" id="name" name="name" value="{{.Category.Name}}" required
class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500">
</div>
<div>
<label for="slug" class="block text-gray-700 text-sm font-bold mb-2">Slug</label>
<input type="text" id="slug" name="slug" value="{{.Category.Slug}}" required
class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500">
</div>
<div>
<label for="parent_id" class="block text-gray-700 text-sm font-bold mb-2">Parent Category</label>
<select id="parent_id" name="parent_id" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500">
<option value="">None</option>
{{range .Categories}}
{{if ne .ID .Category.ID}}
<option value="{{.ID}}" {{if eq .ID .Category.ParentID}}selected{{end}}>{{.Name}}</option>
{{end}}
{{end}}
</select>
</div>
<div class="flex gap-4">
<button type="submit" class="bg-blue-600 text-white font-bold py-2 px-4 rounded-lg hover:bg-blue-700">Update</button>
<a href="/manage/categories" class="px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-50">Cancel</a>

</div>
</form>
{{end}}
