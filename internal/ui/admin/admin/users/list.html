{{define "content"}}
<h1 class="text-2xl font-bold text-gray-800 mb-6">Users</h1>

<form method="POST" action="/manage/accounts" class="bg-white rounded-lg shadow p-6 mb-6 space-y-4">

<p class="font-semibold">Add New User</p>
<div>
<label for="username" class="block text-gray-700 text-sm font-bold mb-2">Username</label>
<input type="text" id="username" name="username" required
class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500">
</div>
<div>
<label for="password" class="block text-gray-700 text-sm font-bold mb-2">Password</label>
<input type="password" id="password" name="password" required
class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500">
</div>
<div>
<label for="email" class="block text-gray-700 text-sm font-bold mb-2">Email</label>
<input type="email" id="email" name="email"
class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500">
</div>
<div>
<label for="role" class="block text-gray-700 text-sm font-bold mb-2">Role</label>
<select id="role" name="role" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500">
<option value="user">User</option>
<option value="editor">Editor</option>
<option value="admin">Admin</option>
</select>
</div>
<div>
<label>
<input type="checkbox" name="is_admin"> Is Admin
</label>
</div>
<button type="submit" class="bg-blue-600 text-white font-bold py-2 px-4 rounded-lg hover:bg-blue-700">Add User</button>
</form>

{{if .Users}}
<table class="min-w-full bg-white rounded-lg shadow">
<thead>
<tr class="bg-gray-50">
<th class="px-4 py-2 text-left">Username</th>
<th class="px-4 py-2 text-left">Email</th>
<th class="px-4 py-2 text-left">Role</th>
<th class="px-4 py-2 text-left">Status</th>
<th class="px-4 py-2 text-left">Actions</th>
</tr>
</thead>
<tbody>
{{range .Users}}
<tr class="border-t">
<td class="px-4 py-2">{{.Username}}</td>
<td class="px-4 py-2">{{.Email}}</td>
<td class="px-4 py-2">{{.Role}}</td>
<td class="px-4 py-2">{{.Status}}</td>
<td class="px-4 py-2">
<a href="/manage/accounts/edit/{{.ID}}" class="text-blue-600 hover:underline mr-2">Edit</a>
<a href="/manage/accounts/delete/{{.ID}}" class="text-red-600 hover:underline">Delete</a>
</td>

</tr>
{{end}}
</tbody>
</table>
{{end}}
{{end}}
