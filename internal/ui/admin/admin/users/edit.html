{{define "content"}}
<h1 class="text-2xl font-bold text-gray-800 mb-6">Edit User</h1>

<form method="POST" action="/manage/accounts/update/{{.EditUser.ID}}" class="bg-white rounded-lg shadow p-6 space-y-4">

<div>
<label for="email" class="block text-gray-700 text-sm font-bold mb-2">Email</label>
<input type="email" id="email" name="email" value="{{.EditUser.Email}}"
class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500">
</div>
<div>
<label for="password" class="block text-gray-700 text-sm font-bold mb-2">New Password (leave blank to keep current)</label>
<input type="password" id="password" name="password"
class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500">
</div>
<div>
<label for="role" class="block text-gray-700 text-sm font-bold mb-2">Role</label>
<select id="role" name="role" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500">
<option value="user" {{if eq .EditUser.Role "user"}}selected{{end}}>User</option>
<option value="editor" {{if eq .EditUser.Role "editor"}}selected{{end}}>Editor</option>
<option value="admin" {{if eq .EditUser.Role "admin"}}selected{{end}}>Admin</option>
</select>
</div>
<div>
<label for="status" class="block text-gray-700 text-sm font-bold mb-2">Status</label>
<select id="status" name="status" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500">
<option value="activated" {{if eq .EditUser.Status "activated"}}selected{{end}}>Activated</option>
<option value="suspended" {{if eq .EditUser.Status "suspended"}}selected{{end}}>Suspended</option>
</select>
</div>
<div>
<label>
<input type="checkbox" name="is_admin" {{if .EditUser.IsAdmin}}checked{{end}}> Is Admin
</label>
</div>
<div class="flex gap-4">
<button type="submit" class="bg-blue-600 text-white font-bold py-2 px-4 rounded-lg hover:bg-blue-700">Update</button>
<a href="/manage/accounts" class="px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-50">Cancel</a>

</div>
</form>
{{end}}
