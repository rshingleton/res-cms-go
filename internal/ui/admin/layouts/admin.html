<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title x-data x-text="`${$store.app.siteName} | Admin`"></title>
    
    <!-- Axentix CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/axentix@2.3.0/dist/axentix.min.css">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Alpine.js Plugins -->
    <script defer src="https://unpkg.com/@alpinejs/collapse@3.x.x/dist/cdn.min.js"></script>
    <!-- Alpine.js Core -->
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <style>
        [x-cloak] { display: none !important; }
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        
        .sidenav-link { border-radius: 0 50px 50px 0; margin-right: 1rem; font-weight: 600; transition: all 0.2s; }
        .sidenav-link.active { background-color: #eff6ff !important; color: #2563eb !important; font-weight: 800; }
        
        /* Toast Fixes: Ensure toast is above the navbar */
        .ax-toast { border-radius: 8px !important; font-weight: 600 !important; z-index: 9999 !important; }
        .toast-container { z-index: 9999 !important; }
        
        /* Tag / Badge Custom padding to ensure it looks like a tag */
        .tag-status { padding: 0.3rem 0.7rem; border-radius: 0.25rem; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; display: inline-block; line-height: 1; letter-spacing: 0.5px; }

        /* Ensure Navbar is above content but below toast */
        .navbar { z-index: 1000 !important; }
    </style>
</head>
<body class="layout-sidenav-fixed" x-data x-cloak>
    
    <header>
        <nav class="navbar white px-5 shadow-0 border-bottom-1 border-slate-light-4">
            <button data-target="sidenav" class="btn btn-small circle transparent text-grey hide-md-up mr-3 sidenav-trigger">
                <i class="fas fa-bars"></i>
            </button>
            <div class="navbar-brand font-w900 font-s4 text-slate-900 capitalize">{{.ActiveTab}}</div>
            <div class="ml-auto d-flex vcenter">
                <a href="/" target="_blank" class="btn blue rounded-1 shadow-1 font-w800 px-3 py-2 d-flex vcenter" style="line-height: 1;">
                    <i class="fas fa-external-link-alt mr-2"></i> View Site
                </a>
            </div>
        </nav>
    </header>

    <!-- Sidenav with sidenav-fixed class -->
    <div id="sidenav" class="sidenav sidenav-fixed white shadow-0 border-right-1 border-slate-light-4" data-ax="sidenav">
        <div class="sidenav-header flex flex-row align-center px-5 mb-4 border-bottom-1 border-slate-light-4" style="height: 64px;">
            <span class="font-w900 font-s4 text-blue tracking-tighter uppercase">ResCMS</span>
        </div>
        <div class="flex flex-column g-gap-1 mt-2">
            <a href="/manage" class="sidenav-link hover-bg-slate-light-5 text-slate-dark-1 {{if eq .ActiveTab "dashboard"}}active{{end}}">
                <i class="fas fa-grid-2 mr-3 font-s2"></i> Dashboard
            </a>
            <a href="/manage/posts" class="sidenav-link hover-bg-slate-light-5 text-slate-dark-1 {{if eq .ActiveTab "posts"}}active{{end}}">
                <i class="fas fa-file-alt mr-3 font-s2"></i> Posts
            </a>
            <a href="/manage/pages" class="sidenav-link hover-bg-slate-light-5 text-slate-dark-1 {{if eq .ActiveTab "categories"}}active{{end}}">
                <i class="fas fa-file mr-3 font-s2"></i> Pages
            </a>
            <a href="/manage/comments" class="sidenav-link hover-bg-slate-light-5 text-slate-dark-1 {{if eq .ActiveTab "comments"}}active{{end}}">
                <i class="fas fa-comments mr-3 font-s2"></i> Feedback
            </a>
            <a href="/manage/accounts" class="sidenav-link hover-bg-slate-light-5 text-slate-dark-1 {{if eq .ActiveTab "users"}}active{{end}}">
                <i class="fas fa-users-gear mr-3 font-s2"></i> Accounts
            </a>
            <a href="/manage/themes" class="sidenav-link hover-bg-slate-light-5 text-slate-dark-1 {{if eq .ActiveTab "themes"}}active{{end}}">
                <i class="fas fa-palette mr-3 font-s2"></i> Theme
            </a>
            <a href="/manage/plugins" class="sidenav-link hover-bg-slate-light-5 text-slate-dark-1 {{if eq .ActiveTab "plugins"}}active{{end}}">
                <i class="fas fa-plug mr-3 font-s2"></i> Plugins
            </a>
            <a href="/manage/configs" class="sidenav-link hover-bg-slate-light-5 text-slate-dark-1 {{if eq .ActiveTab "settings"}}active{{end}}">
                <i class="fas fa-cog mr-3 font-s2"></i> Settings
            </a>
        </div>
        <div class="mt-auto p-4 border-top-1 border-slate-light-4">
            <a href="/access/logout" class="btn btn-small red light-4 text-red rounded-1 w-100 font-w800 shadow-0 hover-shadow-1">Logout</a>
        </div>
    </div>

    <main>
        <div class="p-4">
            {{block "content" .}}{{end}}
        </div>
    </main>

    <!-- Axentix JS -->
    <script src="https://cdn.jsdelivr.net/npm/axentix@2.3.0/dist/axentix.min.js"></script>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.store('app', {
                siteName: '{{.BlogName}}',
                notify(message, type = 'info') {
                    const colorClass = type === 'error' ? 'red' : 'blue';
                    const icon = type === 'error' ? 'fa-exclamation-circle' : 'fa-check-circle';
                    
                    // Axentix 2.x Toast
                    const toast = new Axentix.Toast(
                        `<div class='d-flex vcenter'><i class='fas ${icon} mr-2'></i> ${message}</div>`,
                        {
                            classes: `${colorClass} light-4 text-${colorClass}-dark-3 shadow-1 rounded-1 border-all-1`,
                            duration: 4000,
                            direction: 'top',
                            position: 'right'
                        }
                    );
                    toast.show();
                }
            });
        });

        // Auto-show flash messages
        window.onload = () => {
            const flash = '{{.Flash}}';
            if (flash) {
                // Slight delay to ensure UI is ready and visible
                setTimeout(() => {
                    Alpine.store('app').notify(flash, 'success');
                }, 100);
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            // Sidenav is auto-initialized by data-ax="sidenav"
        });
    </script>

    <!-- Monaco Editor Scripts -->
    {{if eq .ActiveTab "themes"}}
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
    <script>
        if (window.require && !window.require.config_applied) {
            require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs' }});
            window.require.config_applied = true;
        }
    </script>
    {{end}}
</body>
</html>
